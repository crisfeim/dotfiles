name: test-install
on:
  push:
    paths:
      - "brewfile"
      - "install.sh"
      - ".github/workflows/test-install.yml"
jobs:
  test:
    runs-on: macos-latest
    steps:
      - run: curl -fsSL https://raw.githubusercontent.com/crisfeim/dotfiles/${{ github.sha }}/install.sh | bash
      - run: test -L ~/.zshrc
      - run: test -L ~/.config/nvim
      - run: test -L ~/.sqliterc
      - run: test -L ~/Library/Application\ Support/CodeRunner/Languages/Swift.crLanguage/Scripts/compile.sh
      - name: verify tclsh is Homebrew's, not the legacy Apple one
        run: |
          which tclsh
          [[ "$(which tclsh)" == /opt/homebrew/bin/tclsh || "$(which tclsh)" == /usr/local/bin/tclsh ]]
      - name: verify tclsh version and unicode handling
        run: |
          tclsh <<'EOF'
          puts [info patchlevel]
          if {![string match "9.*" [info patchlevel]]} {
              puts stderr "Expected Tcl 9.x, got [info patchlevel]"
              exit 1
          }
          EOF
      - name: iterm
        run: |
          defaults read com.googlecode.iterm2 PrefsCustomFolder
          test "$(defaults read com.googlecode.iterm2 LoadPrefsFromCustomFolder)" = "1"
          test -f ~/dotfiles/configs/iterm/com.googlecode.iterm2.plist
      - name: gitignore
        run: |
          test -L ~/.gitignore_global
          test "$(git config --global core.excludesFile)" = "$HOME/.gitignore_global"
